note: >-
  ServiceNow provides native Model Context Protocol support as a first-party
  platform capability introduced with the Zurich release. The Now Platform acts
  as both an MCP consumer (the MCP Client, connecting to external tools) and an
  MCP provider (the MCP Server Console, exposing ServiceNow capabilities to
  external AI agents). MCP servers are hosted per customer instance rather than
  at a single global URL, so no fixed public endpoint is published. The first
  set of exposed tools are Now Assist Skills, which are governed for AI use.
  The tools[] list below is a DERIVED candidate mapping from the REST operations
  captured in this repo's OpenAPI, useful as a scripted-REST/Table-API MCP
  surface; it is not the authoritative ServiceNow-published tool set.

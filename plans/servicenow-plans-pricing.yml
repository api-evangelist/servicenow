specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: ServiceNow
providerId: servicenow
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - ITSM
  - Workflow
  - Enterprise Platform
  - Now Platform
  - Automation
description: ServiceNow does not publish public pricing. The Now Platform is sold through ServiceNow
  Sales as a quote-based enterprise subscription with named modules (ITSM, ITOM, HR Service Delivery,
  Customer Service Management, Now Assist, App Engine, Integration Hub, etc.). API access is included
  with the customer instance and is governed by per-instance, per-user transaction quotas (CTUs / table-API
  request entitlements) negotiated at contract time.
sources:
  - https://www.servicenow.com/products.html
notes: No public pricing or self-serve plan tiers were reconcilable. ServiceNow is a quote-based enterprise
  platform; entitlements (CTUs, transaction allotments, integration runs) are negotiated per customer.
plans:
  - id: servicenow-contact-sales
    name: Contact Sales
    type: enterprise
    description: Quote-based enterprise subscription on the Now Platform. Customers negotiate seats
      / fulfiller users, modules (ITSM, ITOM, HRSD, CSM, App Engine, Integration Hub, Now Assist), and
      transaction-based add-ons (Custom Table Updates, Integration Hub transactions).
    entries:
      - label: Subscription
        name: enterprise_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Now Platform Instance
      - name: Table API
      - name: Now Assist (where licensed)
      - name: Integration Hub (where licensed)
      - name: ITSM / ITOM / HRSD / CSM / App Engine modules (where licensed)
maintainers:

    type: Documentation
  - url: openapi/servicenow-aggregate-api-openapi.yml
    type: OpenAPI
  description: The ServiceNow Aggregate API provides endpoints to compute aggregate
    statistics (count, average, min, max, sum) against records in any ServiceNow table.
    It supports grouping and filtering results, making it useful for reporting and
    dashboard data retrieval.
- aid: servicenow:servicenow-attachment-api

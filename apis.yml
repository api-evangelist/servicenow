  properties:
  - url: https://www.servicenow.com/docs/bundle/yokohama-api-reference/page/integrate/inbound-rest/concept/batch-api.html
    type: Documentation
  description: The ServiceNow Batch API enables sending multiple REST API requests
    in a single HTTP call, reducing network overhead and improving integration performance.
    Each request in the batch is executed independently, and the API returns a stream
    of corresponding responses.

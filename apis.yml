    type: Documentation
  - url: openapi/servicenow-import-set-api-openapi.yml
    type: OpenAPI
  description: The ServiceNow Import Set API allows external systems to push data
    into ServiceNow import set tables, which can then be synchronously or asynchronously
    transformed and loaded into target tables. It is commonly used for integrating
    external data sources with ServiceNow using transform maps.
- aid: servicenow:servicenow-batch-api
  name: ServiceNow Batch API
  tags:
  - Batch
  - Performance
  - Integration
  - REST
  image: https://www.servicenow.com/content/dam/servicenow-assets/images/meganav/servicenow-logo.svg
  humanURL: https://www.servicenow.com/docs/bundle/yokohama-api-reference/page/integrate/inbound-rest/concept/batch-api.html

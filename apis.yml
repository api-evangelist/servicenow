    type: Reference
  - url: openapi/servicenow-table-api-openapi.yml
    type: OpenAPI
  description: The ServiceNow Table API provides endpoints to perform create, read,
    update, and delete (CRUD) operations on records within any ServiceNow table. It
    is the primary REST interface for interacting with ServiceNow platform data such
    as incidents, problems, changes, and custom tables.

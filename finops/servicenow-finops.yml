created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - ITSM
  - Now Platform
  - FinOps
  - FOCUS
description: FinOps shape for ServiceNow — a quote-based enterprise SaaS platform. Cost is dominated
  by negotiated subscription line items (fulfiller / requester users, named modules, Now Assist consumption
  units, Integration Hub transactions). Numeric pricing is not published and is negotiated per contract.
  Integration consumption (table API calls, Integration Hub transactions, Now Assist tokens) maps to internal
  instance meters that ServiceNow exposes through Subscription Management Lifecycle and Performance Analytics.
sources:
  - https://www.servicenow.com/
notes: Pricing line items, FOCUS column mappings, and meter unit prices are not publicly disclosed; reconciled
  to known commercial structure only.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'

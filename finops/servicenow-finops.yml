meters:
  - name: fulfiller_users
    description: Named fulfiller / agent users (primary subscription driver)
    unit: seat
    aggregation: max
    dimensions:
      - role
  - name: requester_users
    description: Requester / employee users where licensed
    unit: seat
    aggregation: max
  - name: integration_hub_transactions
    description: Integration Hub transactions consumed against the subscription pool
    unit: transaction
    aggregation: sum
    dimensions:
      - flow
      - spoke
  - name: now_assist_consumption_units
    description: Now Assist generative-AI consumption units (where licensed)
    unit: consumption-unit
    aggregation: sum
    dimensions:
      - module
  - name: custom_table_updates
    description: Custom Table Updates / table API write volume against the entitlement
    unit: update
    aggregation: sum
    dimensions:
      - table
  - name: subscription_fee
    description: Negotiated annual subscription fee (modules + seats)
    unit: year
    aggregation: sum
    dimensions:
      - module
principles:
  - name: Visibility
    description: Use ServiceNow Subscription Management Lifecycle, Performance Analytics, and the SAM
      Pro app to track entitlement burn for users, transactions, and Now Assist consumption units. Custom
      reports on sys_audit and the integration_hub.transaction tables expose granular activity.
  - name: Allocation
    description: Allocate subscription cost by user role / department from the user table, and tag integrations
      with a consuming-application reference so Integration Hub transaction usage rolls up to the right
      cost center.
  - name: Optimization
    description: Right-size fulfiller seats annually against actual login activity; consolidate redundant
      Integration Hub flows; cap Now Assist usage with platform guardrails before approving generative-AI
      features in production.
  - name: Accountability
    description: ServiceNow CoE / Platform owner is accountable for entitlement burn and rate-limit
      configuration; finance leads contract renegotiation; module owners (ITSM, HRSD, CSM) defend their
      seat counts.
maintainers:

naftiko: "1.0.0-alpha1"

info:
  label: "ServiceNow Trouble Ticket API"
  description: "Create, update, and retrieve trouble tickets (Cases, Incidents, Service Problem Cases) using the TMF621-based Trouble Ticket Open API."
  tags:
    - ServiceNow
    - Trouble Ticket
    - Incident Management
    - TMF621
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SERVICENOW_USERNAME: SERVICENOW_USERNAME
      SERVICENOW_PASSWORD: SERVICENOW_PASSWORD

capability:
  consumes:
    - type: http
      namespace: servicenow-trouble-ticket
      baseUri: "https://{{SERVICENOW_INSTANCE}}.servicenow.com/api/sn_ind_tsm_sdwan/ticket"
      description: "ServiceNow Trouble Ticket Open API (TMF621) for managing tickets across Cases, Incidents, and Service Problem Cases."
      authentication:
        type: basic
        username: "{{SERVICENOW_USERNAME}}"
        password: "{{SERVICENOW_PASSWORD}}"
      resources:
        - name: trouble-tickets
          path: /troubleTicket
          description: "Trouble ticket operations."
          operations:
            - name: list-trouble-tickets
              method: GET
              description: "Retrieve all trouble tickets."
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of fields to return."
                - name: id
                  in: query
                  type: string
                  required: false
                  description: "Filter by sys_id."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Starting index for pagination."
                - name: severity
                  in: query
                  type: string
                  required: false
                  description: "Filter by severity."
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status."
                - name: ticketType
                  in: query
                  type: string
                  required: false
                  description: "Filter by ticket type (Case, Incident, Service Problem Case)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-trouble-ticket
              method: POST
              description: "Create a trouble ticket."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  severity: "{{tools.severity}}"
                  status: "{{tools.status}}"
                  ticketType: "{{tools.ticketType}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-trouble-ticket
              method: GET
              path: /{id}
              description: "Retrieve a specific trouble ticket."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The sys_id of the trouble ticket."
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Fields to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: update-trouble-ticket
              method: PATCH
              path: /{id}
              description: "Update a trouble ticket."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The sys_id of the trouble ticket."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  severity: "{{tools.severity}}"
                  status: "{{tools.status}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8108
      namespace: servicenow-trouble-ticket-api
      resources:
        - path: /v1/trouble-tickets
          name: trouble-tickets
          description: "Trouble ticket operations."
          operations:
            - method: GET
              name: list-trouble-tickets
              description: "List trouble tickets."
              call: "servicenow-trouble-ticket.list-trouble-tickets"
              with:
                limit: "rest.limit"
                offset: "rest.offset"
                severity: "rest.severity"
                status: "rest.status"
                ticketType: "rest.ticketType"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-trouble-ticket
              description: "Create a trouble ticket."
              call: "servicenow-trouble-ticket.create-trouble-ticket"
              with:
                name: "rest.name"
                description: "rest.description"
                severity: "rest.severity"
                status: "rest.status"
                ticketType: "rest.ticketType"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/trouble-tickets/{id}
          name: trouble-ticket-detail
          description: "Single trouble ticket operations."
          operations:
            - method: GET
              name: get-trouble-ticket
              description: "Get a specific trouble ticket."
              call: "servicenow-trouble-ticket.get-trouble-ticket"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: update-trouble-ticket
              description: "Update a trouble ticket."
              call: "servicenow-trouble-ticket.update-trouble-ticket"
              with:
                id: "rest.id"
                name: "rest.name"
                description: "rest.description"
                severity: "rest.severity"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9108
      namespace: servicenow-trouble-ticket-mcp
      transport: http
      tools:
        - name: list-trouble-tickets
          description: "List trouble tickets with optional filtering by severity, status, and type."
          hints:
            readOnly: true
            idempotent: true
            openWorld: true
          call: "servicenow-trouble-ticket.list-trouble-tickets"
          with:
            limit: "tools.limit"
            offset: "tools.offset"
            severity: "tools.severity"
            status: "tools.status"
            ticketType: "tools.ticketType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-trouble-ticket
          description: "Create a new trouble ticket (Case, Incident, or Service Problem Case)."
          hints:
            readOnly: false
            idempotent: false
          call: "servicenow-trouble-ticket.create-trouble-ticket"
          with:
            name: "tools.name"
            description: "tools.description"
            severity: "tools.severity"
            status: "tools.status"
            ticketType: "tools.ticketType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-trouble-ticket
          description: "Retrieve a specific trouble ticket by sys_id."
          hints:
            readOnly: true
            idempotent: true
          call: "servicenow-trouble-ticket.get-trouble-ticket"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-trouble-ticket
          description: "Update an existing trouble ticket."
          hints:
            readOnly: false
            idempotent: true
          call: "servicenow-trouble-ticket.update-trouble-ticket"
          with:
            id: "tools.id"
            name: "tools.name"
            description: "tools.description"
            severity: "tools.severity"
          outputParameters:
            - type: object
              mapping: "$."

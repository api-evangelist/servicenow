naftiko: 1.0.0-alpha2
info:
  label: ServiceNow Change Management API — Emergency Changes
  description: 'ServiceNow Change Management API — Emergency Changes. 2 operations. Lead operation: Servicenow List Emergency
    Change Requests. Self-contained Naftiko capability covering one Servicenow business surface.'
  tags:
  - Servicenow
  - Emergency Changes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SERVICENOW_API_KEY: SERVICENOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: change-management-emergency-changes
    baseUri: https://{instance}.service-now.com/api/sn_chg_rest/v1
    description: ServiceNow Change Management API — Emergency Changes business capability. Self-contained, no shared references.
    resources:
    - name: change-emergency
      path: /change/emergency
      operations:
      - name: listemergencychanges
        method: GET
        description: Servicenow List Emergency Change Requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createemergencychange
        method: POST
        description: Servicenow Create an Emergency Change Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SERVICENOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: change-management-emergency-changes-rest
    port: 8080
    description: REST adapter for ServiceNow Change Management API — Emergency Changes. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/change/emergency
      name: change-emergency
      description: REST surface for change-emergency.
      operations:
      - method: GET
        name: listemergencychanges
        description: Servicenow List Emergency Change Requests
        call: change-management-emergency-changes.listemergencychanges
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createemergencychange
        description: Servicenow Create an Emergency Change Request
        call: change-management-emergency-changes.createemergencychange
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: change-management-emergency-changes-mcp
    port: 9090
    transport: http
    description: MCP adapter for ServiceNow Change Management API — Emergency Changes. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: servicenow-list-emergency-change-requests
      description: Servicenow List Emergency Change Requests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-emergency-changes.listemergencychanges
      outputParameters:
      - type: object
        mapping: $.
    - name: servicenow-create-emergency-change-request
      description: Servicenow Create an Emergency Change Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: change-management-emergency-changes.createemergencychange
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

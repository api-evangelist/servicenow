naftiko: 1.0.0-alpha2
info:
  label: ServiceNow Change Management API — Change Tasks
  description: 'ServiceNow Change Management API — Change Tasks. 2 operations. Lead operation: Servicenow List Tasks for a
    Change Request. Self-contained Naftiko capability covering one Servicenow business surface.'
  tags:
  - Servicenow
  - Change Tasks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SERVICENOW_API_KEY: SERVICENOW_API_KEY
capability:
  consumes:
  - type: http
    namespace: change-management-change-tasks
    baseUri: https://{instance}.service-now.com/api/sn_chg_rest/v1
    description: ServiceNow Change Management API — Change Tasks business capability. Self-contained, no shared references.
    resources:
    - name: change-sys_id-task
      path: /change/{sys_id}/task
      operations:
      - name: listchangetasks
        method: GET
        description: Servicenow List Tasks for a Change Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createchangetask
        method: POST
        description: Servicenow Create a Task for a Change Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SERVICENOW_API_KEY}}'
  exposes:
  - type: rest
    namespace: change-management-change-tasks-rest
    port: 8080
    description: REST adapter for ServiceNow Change Management API — Change Tasks. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/change/{sys-id}/task
      name: change-sys-id-task
      description: REST surface for change-sys_id-task.
      operations:
      - method: GET
        name: listchangetasks
        description: Servicenow List Tasks for a Change Request
        call: change-management-change-tasks.listchangetasks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createchangetask
        description: Servicenow Create a Task for a Change Request
        call: change-management-change-tasks.createchangetask
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: change-management-change-tasks-mcp
    port: 9090
    transport: http
    description: MCP adapter for ServiceNow Change Management API — Change Tasks. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: servicenow-list-tasks-change-request
      description: Servicenow List Tasks for a Change Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: change-management-change-tasks.listchangetasks
      outputParameters:
      - type: object
        mapping: $.
    - name: servicenow-create-task-change-request
      description: Servicenow Create a Task for a Change Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: change-management-change-tasks.createchangetask
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

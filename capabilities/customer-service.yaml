naftiko: 1.0.0-alpha2
info:
  label: ServiceNow Customer Service
  description: Unified workflow for customer service operations combining contact management, service catalog browsing and
    ordering, and trouble ticket handling. Used by customer service agents and self-service portal integrations.
  tags:
  - ServiceNow
  - Customer Service
  - Service Catalog
  - Contacts
  - Self Service
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SERVICENOW_USERNAME: SERVICENOW_USERNAME
    SERVICENOW_PASSWORD: SERVICENOW_PASSWORD
    SERVICENOW_INSTANCE: SERVICENOW_INSTANCE
capability:
  consumes:
  - type: http
    namespace: servicenow-contact
    baseUri: https://{{SERVICENOW_INSTANCE}}.servicenow.com/api/now
    description: ServiceNow Contact API for managing CSM contacts.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: contacts
      path: /contact
      description: CSM contact operations.
      operations:
      - name: list-contacts
        method: GET
        description: Retrieve a list of CSM contacts.
        inputParameters:
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query to filter contacts.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting record index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: create-contact
        method: POST
        description: Create a new CSM contact.
        body:
          type: json
          data:
            first_name: '{{tools.first_name}}'
            last_name: '{{tools.last_name}}'
            email: '{{tools.email}}'
            phone: '{{tools.phone}}'
            company: '{{tools.company}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-contact
        method: GET
        path: /{id}
        description: Retrieve a specific contact by sys_id.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The sys_id of the contact.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  - type: http
    namespace: servicenow-service-catalog
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/sn_sc
    description: ServiceNow Service Catalog API for browsing and ordering catalog items.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: catalogs
      path: /servicecatalog/catalogs
      description: Service catalog operations.
      operations:
      - name: list-catalogs
        method: GET
        description: List all available service catalogs.
        inputParameters:
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of catalogs to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-catalog
        method: GET
        path: /{sys_id}
        description: Retrieve a specific service catalog.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique identifier for the catalog.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
    - name: categories
      path: /servicecatalog/categories
      description: Catalog category operations.
      operations:
      - name: get-category
        method: GET
        path: /{sys_id}
        description: Retrieve a catalog category with child categories.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique identifier for the category.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
    - name: catalog-items
      path: /servicecatalog/items
      description: Catalog item operations.
      operations:
      - name: list-catalog-items
        method: GET
        description: List catalog items with optional filtering.
        inputParameters:
        - name: sysparm_catalog
          in: query
          type: string
          required: false
          description: Filter by catalog sys_id.
        - name: sysparm_category
          in: query
          type: string
          required: false
          description: Filter by category sys_id.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of items to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-catalog-item
        method: GET
        path: /{sys_id}
        description: Retrieve a catalog item with variables and pricing.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique identifier for the catalog item.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: add-item-to-cart
        method: POST
        path: /{sys_id}/add_to_cart
        description: Add a catalog item to the shopping cart.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The catalog item sys_id.
        body:
          type: json
          data:
            sysparm_quantity: '{{tools.quantity}}'
            variables: '{{tools.variables}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: order-item-now
        method: POST
        path: /{sys_id}/order_now
        description: Order a catalog item immediately without using the cart.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The catalog item sys_id.
        body:
          type: json
          data:
            sysparm_quantity: '{{tools.quantity}}'
            variables: '{{tools.variables}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
    - name: cart
      path: /servicecatalog/cart
      description: Shopping cart operations.
      operations:
      - name: get-cart
        method: GET
        description: Retrieve the current user's shopping cart.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: empty-cart
        method: DELETE
        description: Remove all items from the shopping cart.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: submit-cart-order
        method: POST
        path: /submit_order
        description: Submit all cart items as a service catalog request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  - type: http
    namespace: servicenow-trouble-ticket
    baseUri: https://{{SERVICENOW_INSTANCE}}.servicenow.com/api/sn_ind_tsm_sdwan/ticket
    description: ServiceNow Trouble Ticket Open API (TMF621) for managing tickets across Cases, Incidents, and Service Problem
      Cases.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: trouble-tickets
      path: /troubleTicket
      description: Trouble ticket operations.
      operations:
      - name: list-trouble-tickets
        method: GET
        description: Retrieve all trouble tickets.
        inputParameters:
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return.
        - name: id
          in: query
          type: string
          required: false
          description: Filter by sys_id.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum records to return.
        - name: offset
          in: query
          type: integer
          required: false
          description: Starting index for pagination.
        - name: severity
          in: query
          type: string
          required: false
          description: Filter by severity.
        - name: status
          in: query
          type: string
          required: false
          description: Filter by status.
        - name: ticketType
          in: query
          type: string
          required: false
          description: Filter by ticket type (Case, Incident, Service Problem Case).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-trouble-ticket
        method: POST
        description: Create a trouble ticket.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
            severity: '{{tools.severity}}'
            status: '{{tools.status}}'
            ticketType: '{{tools.ticketType}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-trouble-ticket
        method: GET
        path: /{id}
        description: Retrieve a specific trouble ticket.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The sys_id of the trouble ticket.
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-trouble-ticket
        method: PATCH
        path: /{id}
        description: Update a trouble ticket.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The sys_id of the trouble ticket.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
            severity: '{{tools.severity}}'
            status: '{{tools.status}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: servicenow-customer-service-api
    description: Unified REST API for ServiceNow customer service operations.
    resources:
    - path: /v1/contacts
      name: contacts
      description: CSM contact management.
      operations:
      - method: GET
        name: list-contacts
        description: List CSM contacts.
        call: servicenow-contact.list-contacts
        with:
          sysparm_query: rest.sysparm_query
          sysparm_limit: rest.sysparm_limit
        outputParameters:
        - type: object
          mapping: $.result
      - method: POST
        name: create-contact
        description: Create a CSM contact.
        call: servicenow-contact.create-contact
        with:
          first_name: rest.first_name
          last_name: rest.last_name
          email: rest.email
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/contacts/{id}
      name: contact-detail
      description: Single contact operations.
      operations:
      - method: GET
        name: get-contact
        description: Get a specific contact.
        call: servicenow-contact.get-contact
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/catalogs
      name: catalogs
      description: Service catalog browsing.
      operations:
      - method: GET
        name: list-catalogs
        description: List service catalogs.
        call: servicenow-service-catalog.list-catalogs
        with:
          sysparm_limit: rest.sysparm_limit
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/catalog-items
      name: catalog-items
      description: Catalog item browsing.
      operations:
      - method: GET
        name: list-catalog-items
        description: List catalog items.
        call: servicenow-service-catalog.list-catalog-items
        with:
          sysparm_catalog: rest.sysparm_catalog
          sysparm_category: rest.sysparm_category
          sysparm_limit: rest.sysparm_limit
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/catalog-items/{sys_id}
      name: catalog-item-detail
      description: Single catalog item.
      operations:
      - method: GET
        name: get-catalog-item
        description: Get catalog item details.
        call: servicenow-service-catalog.get-catalog-item
        with:
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/cart
      name: cart
      description: Shopping cart.
      operations:
      - method: GET
        name: get-cart
        description: Get cart contents.
        call: servicenow-service-catalog.get-cart
        outputParameters:
        - type: object
          mapping: $.result
      - method: DELETE
        name: empty-cart
        description: Empty the cart.
        call: servicenow-service-catalog.empty-cart
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/trouble-tickets
      name: trouble-tickets
      description: Trouble ticket operations.
      operations:
      - method: GET
        name: list-trouble-tickets
        description: List trouble tickets.
        call: servicenow-trouble-ticket.list-trouble-tickets
        with:
          limit: rest.limit
          severity: rest.severity
          status: rest.status
          ticketType: rest.ticketType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-trouble-ticket
        description: Create a trouble ticket.
        call: servicenow-trouble-ticket.create-trouble-ticket
        with:
          name: rest.name
          description: rest.description
          severity: rest.severity
          status: rest.status
          ticketType: rest.ticketType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: servicenow-customer-service-mcp
    transport: http
    description: MCP server for AI-assisted ServiceNow customer service workflows.
    tools:
    - name: list-contacts
      description: List CSM contacts with optional filtering.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-contact.list-contacts
      with:
        sysparm_query: tools.sysparm_query
        sysparm_limit: tools.sysparm_limit
      outputParameters:
      - type: object
        mapping: $.result
    - name: create-contact
      description: Create a new CSM contact.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-contact.create-contact
      with:
        first_name: tools.first_name
        last_name: tools.last_name
        email: tools.email
        phone: tools.phone
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-contact
      description: Retrieve a specific CSM contact.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-contact.get-contact
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.result
    - name: list-catalogs
      description: List available service catalogs.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-service-catalog.list-catalogs
      with:
        sysparm_limit: tools.sysparm_limit
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-catalog
      description: Retrieve a specific service catalog.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-service-catalog.get-catalog
      with:
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-category
      description: Retrieve a catalog category with subcategories.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-service-catalog.get-category
      with:
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.result
    - name: list-catalog-items
      description: List catalog items with optional filtering.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-service-catalog.list-catalog-items
      with:
        sysparm_catalog: tools.sysparm_catalog
        sysparm_category: tools.sysparm_category
        sysparm_limit: tools.sysparm_limit
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-catalog-item
      description: Retrieve catalog item details with variables.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-service-catalog.get-catalog-item
      with:
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.result
    - name: add-item-to-cart
      description: Add a catalog item to the shopping cart.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-service-catalog.add-item-to-cart
      with:
        sys_id: tools.sys_id
        quantity: tools.quantity
        variables: tools.variables
      outputParameters:
      - type: object
        mapping: $.result
    - name: order-item-now
      description: Order a catalog item immediately.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-service-catalog.order-item-now
      with:
        sys_id: tools.sys_id
        quantity: tools.quantity
        variables: tools.variables
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-cart
      description: Retrieve shopping cart contents.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-service-catalog.get-cart
      outputParameters:
      - type: object
        mapping: $.result
    - name: empty-cart
      description: Remove all items from the shopping cart.
      hints:
        destructive: true
        idempotent: true
      call: servicenow-service-catalog.empty-cart
      outputParameters:
      - type: object
        mapping: $.result
    - name: submit-cart-order
      description: Submit cart as a service catalog request.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-service-catalog.submit-cart-order
      outputParameters:
      - type: object
        mapping: $.result
    - name: list-trouble-tickets
      description: List trouble tickets.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-trouble-ticket.list-trouble-tickets
      with:
        limit: tools.limit
        severity: tools.severity
        status: tools.status
        ticketType: tools.ticketType
      outputParameters:
      - type: object
        mapping: $.
    - name: create-trouble-ticket
      description: Create a trouble ticket.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-trouble-ticket.create-trouble-ticket
      with:
        name: tools.name
        description: tools.description
        severity: tools.severity
        status: tools.status
        ticketType: tools.ticketType
      outputParameters:
      - type: object
        mapping: $.
    - name: get-trouble-ticket
      description: Retrieve a specific trouble ticket.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-trouble-ticket.get-trouble-ticket
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-trouble-ticket
      description: Update an existing trouble ticket.
      hints:
        readOnly: false
        idempotent: true
      call: servicenow-trouble-ticket.update-trouble-ticket
      with:
        id: tools.id
        name: tools.name
        severity: tools.severity
      outputParameters:
      - type: object
        mapping: $.

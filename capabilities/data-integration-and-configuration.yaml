naftiko: 1.0.0-alpha2
info:
  label: ServiceNow Data Integration And Configuration
  description: Unified workflow for data integration and configuration management combining import sets for ETL, CMDB for
    configuration items, and attachment management. Used by integration engineers and CMDB administrators.
  tags:
  - ServiceNow
  - Data Integration
  - CMDB
  - ETL
  - Attachments
  - Configuration Management
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SERVICENOW_USERNAME: SERVICENOW_USERNAME
    SERVICENOW_PASSWORD: SERVICENOW_PASSWORD
    SERVICENOW_INSTANCE: SERVICENOW_INSTANCE
capability:
  consumes:
  - type: http
    namespace: servicenow-import-set
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/now
    description: ServiceNow Import Set API for bulk data loading and ETL workflows.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: import-sets
      path: /import
      description: Import set staging table operations.
      operations:
      - name: insert-import-set-record
        method: POST
        path: /{stagingTableName}
        description: Insert a single record into an import set staging table.
        inputParameters:
        - name: stagingTableName
          in: path
          type: string
          required: true
          description: The name of the import set staging table.
        body:
          type: json
          data: '{{tools.record_data}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: insert-multiple-import-set-records
        method: POST
        path: /{stagingTableName}/insertMultiple
        description: Insert multiple records into an import set staging table.
        inputParameters:
        - name: stagingTableName
          in: path
          type: string
          required: true
          description: The name of the import set staging table.
        body:
          type: json
          data:
            records: '{{tools.records}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  - type: http
    namespace: servicenow-cmdb-instance
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/now/cmdb
    description: ServiceNow CMDB Instance API for querying configuration items.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: cmdb-instances
      path: /instance
      description: Configuration item instance operations.
      operations:
      - name: list-cmdb-instances
        method: GET
        path: /{className}
        description: List configuration items by CMDB class.
        inputParameters:
        - name: className
          in: path
          type: string
          required: true
          description: The CMDB class name (e.g., cmdb_ci_server, cmdb_ci_linux_server).
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter CI records.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting record index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-cmdb-instance
        method: GET
        path: /{className}/{sys_id}
        description: Retrieve full details of a specific configuration item.
        inputParameters:
        - name: className
          in: path
          type: string
          required: true
          description: The CMDB class name.
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique sys_id of the configuration item.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  - type: http
    namespace: servicenow-attachment
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/now
    description: ServiceNow Attachment API for managing file attachments on records.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: attachments
      path: /attachment
      description: File attachment operations.
      operations:
      - name: list-attachments
        method: GET
        description: Retrieve metadata for file attachments with optional filtering.
        inputParameters:
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter attachments.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of attachment records to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting record index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-attachment
        method: GET
        path: /{sys_id}
        description: Retrieve metadata for a single attachment by sys_id.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique system identifier for the attachment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: delete-attachment
        method: DELETE
        path: /{sys_id}
        description: Delete an attachment and its file content.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique system identifier for the attachment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: download-attachment-file
        method: GET
        path: /{sys_id}/file
        description: Download the binary file content of an attachment.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique system identifier for the attachment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: upload-attachment-binary
        method: POST
        path: /file
        description: Upload a file as a binary stream attached to a table record.
        inputParameters:
        - name: table_name
          in: query
          type: string
          required: true
          description: The table to which the file is attached.
        - name: table_sys_id
          in: query
          type: string
          required: true
          description: The sys_id of the record to attach the file to.
        - name: file_name
          in: query
          type: string
          required: true
          description: The file name including extension.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  exposes:
  - type: rest
    port: 8082
    namespace: servicenow-data-integration-api
    description: Unified REST API for ServiceNow data integration and configuration management.
    resources:
    - path: /v1/import-sets/{stagingTableName}
      name: import-sets
      description: Import set operations.
      operations:
      - method: POST
        name: insert-import-set-record
        description: Insert a record into a staging table.
        call: servicenow-import-set.insert-import-set-record
        with:
          stagingTableName: rest.stagingTableName
          record_data: rest.body
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/import-sets/{stagingTableName}/bulk
      name: import-sets-bulk
      description: Bulk import operations.
      operations:
      - method: POST
        name: insert-multiple-import-set-records
        description: Insert multiple records into a staging table.
        call: servicenow-import-set.insert-multiple-import-set-records
        with:
          stagingTableName: rest.stagingTableName
          records: rest.records
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/cmdb-instances/{className}
      name: cmdb-instances
      description: CMDB configuration item operations.
      operations:
      - method: GET
        name: list-cmdb-instances
        description: List CIs by class.
        call: servicenow-cmdb-instance.list-cmdb-instances
        with:
          className: rest.className
          sysparm_query: rest.sysparm_query
          sysparm_limit: rest.sysparm_limit
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/cmdb-instances/{className}/{sys_id}
      name: cmdb-instance-detail
      description: Single CI operations.
      operations:
      - method: GET
        name: get-cmdb-instance
        description: Get a specific CI.
        call: servicenow-cmdb-instance.get-cmdb-instance
        with:
          className: rest.className
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/attachments
      name: attachments
      description: File attachment operations.
      operations:
      - method: GET
        name: list-attachments
        description: List attachments.
        call: servicenow-attachment.list-attachments
        with:
          sysparm_query: rest.sysparm_query
          sysparm_limit: rest.sysparm_limit
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/attachments/{sys_id}
      name: attachment-detail
      description: Single attachment operations.
      operations:
      - method: GET
        name: get-attachment
        description: Get attachment metadata.
        call: servicenow-attachment.get-attachment
        with:
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.result
      - method: DELETE
        name: delete-attachment
        description: Delete an attachment.
        call: servicenow-attachment.delete-attachment
        with:
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: servicenow-data-integration-mcp
    transport: http
    description: MCP server for AI-assisted ServiceNow data integration and CMDB management.
    tools:
    - name: insert-import-set-record
      description: Insert a single record into an import set staging table.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-import-set.insert-import-set-record
      with:
        stagingTableName: tools.stagingTableName
        record_data: tools.record_data
      outputParameters:
      - type: object
        mapping: $.result
    - name: insert-multiple-import-set-records
      description: Insert multiple records into an import set staging table.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-import-set.insert-multiple-import-set-records
      with:
        stagingTableName: tools.stagingTableName
        records: tools.records
      outputParameters:
      - type: object
        mapping: $.result
    - name: list-cmdb-instances
      description: List configuration items by CMDB class.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-cmdb-instance.list-cmdb-instances
      with:
        className: tools.className
        sysparm_query: tools.sysparm_query
        sysparm_limit: tools.sysparm_limit
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-cmdb-instance
      description: Retrieve full details of a configuration item.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-cmdb-instance.get-cmdb-instance
      with:
        className: tools.className
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.result
    - name: list-attachments
      description: List file attachment metadata.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-attachment.list-attachments
      with:
        sysparm_query: tools.sysparm_query
        sysparm_limit: tools.sysparm_limit
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-attachment
      description: Get metadata for a specific attachment.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-attachment.get-attachment
      with:
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.result
    - name: download-attachment-file
      description: Download the binary file content of an attachment.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-attachment.download-attachment-file
      with:
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-attachment
      description: Delete an attachment and its file content.
      hints:
        destructive: true
        idempotent: true
      call: servicenow-attachment.delete-attachment
      with:
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-attachment-binary
      description: Upload a file as a binary stream attached to a record.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-attachment.upload-attachment-binary
      with:
        table_name: tools.table_name
        table_sys_id: tools.table_sys_id
        file_name: tools.file_name
      outputParameters:
      - type: object
        mapping: $.result

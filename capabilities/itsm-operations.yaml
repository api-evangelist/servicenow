naftiko: 1.0.0-alpha2
info:
  label: ServiceNow ITSM Operations
  description: Unified workflow for IT Service Management operations combining table records, aggregate analytics, change
    management, and trouble tickets. Used by ITSM administrators and service desk agents to manage incidents, changes, and
    operational reporting.
  tags:
  - ServiceNow
  - ITSM
  - Change Management
  - Incident Management
  - Service Desk
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SERVICENOW_USERNAME: SERVICENOW_USERNAME
    SERVICENOW_PASSWORD: SERVICENOW_PASSWORD
    SERVICENOW_INSTANCE: SERVICENOW_INSTANCE
capability:
  consumes:
  - type: http
    namespace: servicenow-table
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/now
    description: ServiceNow Table API for CRUD operations on any table.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: table-records
      path: /table
      description: Table record CRUD operations.
      operations:
      - name: list-records
        method: GET
        path: /{tableName}
        description: List records from a ServiceNow table.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table.
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter results.
        - name: sysparm_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting record index for pagination.
        - name: sysparm_display_value
          in: query
          type: string
          required: false
          description: Controls display vs actual values in response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: create-record
        method: POST
        path: /{tableName}
        description: Create a new record in a ServiceNow table.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table.
        body:
          type: json
          data: '{{tools.record_data}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-record
        method: GET
        path: /{tableName}/{sys_id}
        description: Retrieve a single record by sys_id.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table.
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique 32-character system identifier.
        - name: sysparm_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: update-record
        method: PUT
        path: /{tableName}/{sys_id}
        description: Update an existing record.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table.
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique 32-character system identifier.
        body:
          type: json
          data: '{{tools.record_data}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: patch-record
        method: PATCH
        path: /{tableName}/{sys_id}
        description: Partially update an existing record.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table.
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique 32-character system identifier.
        body:
          type: json
          data: '{{tools.record_data}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: delete-record
        method: DELETE
        path: /{tableName}/{sys_id}
        description: Permanently delete a record.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table.
        - name: sys_id
          in: path
          type: string
          required: true
          description: The unique 32-character system identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: servicenow-aggregate
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/now
    description: ServiceNow Aggregate API for computing statistics on table records.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: aggregate-statistics
      path: /stats
      description: Aggregate statistics operations on ServiceNow tables.
      operations:
      - name: get-aggregate-stats
        method: GET
        path: /{tableName}
        description: Computes aggregate statistics for records in the specified table.
        inputParameters:
        - name: tableName
          in: path
          type: string
          required: true
          description: The name of the ServiceNow table to compute statistics on.
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter records before aggregation.
        - name: sysparm_count
          in: query
          type: boolean
          required: false
          description: When true, returns the count of matching records.
        - name: sysparm_sum_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of numeric fields for sum calculation.
        - name: sysparm_avg_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of numeric fields for average calculation.
        - name: sysparm_min_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields for minimum value.
        - name: sysparm_max_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields for maximum value.
        - name: sysparm_group_by
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to group results by.
        - name: sysparm_order_by
          in: query
          type: string
          required: false
          description: Field by which to order grouped results.
        - name: sysparm_having
          in: query
          type: string
          required: false
          description: Filter applied after aggregation to restrict groups.
        - name: sysparm_display_value
          in: query
          type: string
          required: false
          description: Controls whether display values or actual values are returned.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  - type: http
    namespace: servicenow-change-management
    baseUri: https://{{SERVICENOW_INSTANCE}}.service-now.com/api/sn_chg_rest/v1
    description: ServiceNow Change Management API for managing change requests and tasks.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: normal-changes
      path: /change/normal
      description: Normal change request operations.
      operations:
      - name: list-normal-changes
        method: GET
        description: List normal change requests with optional filtering.
        inputParameters:
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter results.
        - name: sysparm_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting record index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: create-normal-change
        method: POST
        description: Create a new normal change request.
        inputParameters:
        - name: sysparm_fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return.
        body:
          type: json
          data:
            short_description: '{{tools.short_description}}'
            description: '{{tools.description}}'
            priority: '{{tools.priority}}'
            risk: '{{tools.risk}}'
            impact: '{{tools.impact}}'
            category: '{{tools.category}}'
            assigned_to: '{{tools.assigned_to}}'
            assignment_group: '{{tools.assignment_group}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: get-normal-change
        method: GET
        path: /{sys_id}
        description: Retrieve a specific normal change request.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The sys_id of the change request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: update-normal-change
        method: PATCH
        path: /{sys_id}
        description: Update fields on a normal change request.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The sys_id of the change request.
        body:
          type: json
          data:
            short_description: '{{tools.short_description}}'
            description: '{{tools.description}}'
            priority: '{{tools.priority}}'
            state: '{{tools.state}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
    - name: standard-changes
      path: /change/standard
      description: Standard change request operations.
      operations:
      - name: list-standard-changes
        method: GET
        description: List standard change requests.
        inputParameters:
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter results.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        - name: sysparm_offset
          in: query
          type: integer
          required: false
          description: Starting record index for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: create-standard-change
        method: POST
        path: /{standard_change_template_id}
        description: Create a standard change from a pre-approved template.
        inputParameters:
        - name: standard_change_template_id
          in: path
          type: string
          required: true
          description: The sys_id of the standard change template.
        body:
          type: json
          data:
            short_description: '{{tools.short_description}}'
            description: '{{tools.description}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
    - name: emergency-changes
      path: /change/emergency
      description: Emergency change request operations.
      operations:
      - name: list-emergency-changes
        method: GET
        description: List emergency change requests.
        inputParameters:
        - name: sysparm_query
          in: query
          type: string
          required: false
          description: Encoded query string to filter results.
        - name: sysparm_limit
          in: query
          type: integer
          required: false
          description: Maximum number of records to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: create-emergency-change
        method: POST
        description: Create an emergency change request.
        body:
          type: json
          data:
            short_description: '{{tools.short_description}}'
            description: '{{tools.description}}'
            priority: '{{tools.priority}}'
            justification: '{{tools.justification}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
    - name: change-tasks
      path: /change
      description: Change task operations.
      operations:
      - name: list-change-tasks
        method: GET
        path: /{sys_id}/task
        description: List tasks for a change request.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The sys_id of the change request.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
      - name: create-change-task
        method: POST
        path: /{sys_id}/task
        description: Create a task for a change request.
        inputParameters:
        - name: sys_id
          in: path
          type: string
          required: true
          description: The sys_id of the change request.
        body:
          type: json
          data:
            short_description: '{{tools.short_description}}'
            assigned_to: '{{tools.assigned_to}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.result
  - type: http
    namespace: servicenow-trouble-ticket
    baseUri: https://{{SERVICENOW_INSTANCE}}.servicenow.com/api/sn_ind_tsm_sdwan/ticket
    description: ServiceNow Trouble Ticket Open API (TMF621) for managing tickets across Cases, Incidents, and Service Problem
      Cases.
    authentication:
      type: basic
      username: '{{SERVICENOW_USERNAME}}'
      password: '{{SERVICENOW_PASSWORD}}'
    resources:
    - name: trouble-tickets
      path: /troubleTicket
      description: Trouble ticket operations.
      operations:
      - name: list-trouble-tickets
        method: GET
        description: Retrieve all trouble tickets.
        inputParameters:
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return.
        - name: id
          in: query
          type: string
          required: false
          description: Filter by sys_id.
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum records to return.
        - name: offset
          in: query
          type: integer
          required: false
          description: Starting index for pagination.
        - name: severity
          in: query
          type: string
          required: false
          description: Filter by severity.
        - name: status
          in: query
          type: string
          required: false
          description: Filter by status.
        - name: ticketType
          in: query
          type: string
          required: false
          description: Filter by ticket type (Case, Incident, Service Problem Case).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-trouble-ticket
        method: POST
        description: Create a trouble ticket.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
            severity: '{{tools.severity}}'
            status: '{{tools.status}}'
            ticketType: '{{tools.ticketType}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-trouble-ticket
        method: GET
        path: /{id}
        description: Retrieve a specific trouble ticket.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The sys_id of the trouble ticket.
        - name: fields
          in: query
          type: string
          required: false
          description: Fields to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-trouble-ticket
        method: PATCH
        path: /{id}
        description: Update a trouble ticket.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The sys_id of the trouble ticket.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            description: '{{tools.description}}'
            severity: '{{tools.severity}}'
            status: '{{tools.status}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: servicenow-itsm-operations-api
    description: Unified REST API for ServiceNow ITSM operations including records, changes, and trouble tickets.
    resources:
    - path: /v1/records/{tableName}
      name: table-records
      description: Generic table record operations for any ServiceNow table.
      operations:
      - method: GET
        name: list-records
        description: List records from any ServiceNow table.
        call: servicenow-table.list-records
        with:
          tableName: rest.tableName
          sysparm_query: rest.sysparm_query
          sysparm_fields: rest.sysparm_fields
          sysparm_limit: rest.sysparm_limit
          sysparm_offset: rest.sysparm_offset
        outputParameters:
        - type: object
          mapping: $.result
      - method: POST
        name: create-record
        description: Create a record in any table.
        call: servicenow-table.create-record
        with:
          tableName: rest.tableName
          record_data: rest.body
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/records/{tableName}/{sys_id}
      name: table-record-detail
      description: Single record operations.
      operations:
      - method: GET
        name: get-record
        description: Get a single record.
        call: servicenow-table.get-record
        with:
          tableName: rest.tableName
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.result
      - method: PUT
        name: update-record
        description: Update a record.
        call: servicenow-table.update-record
        with:
          tableName: rest.tableName
          sys_id: rest.sys_id
          record_data: rest.body
        outputParameters:
        - type: object
          mapping: $.result
      - method: DELETE
        name: delete-record
        description: Delete a record.
        call: servicenow-table.delete-record
        with:
          tableName: rest.tableName
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/aggregate-stats/{tableName}
      name: aggregate-statistics
      description: Aggregate statistics on table data.
      operations:
      - method: GET
        name: get-aggregate-stats
        description: Compute aggregate statistics.
        call: servicenow-aggregate.get-aggregate-stats
        with:
          tableName: rest.tableName
          sysparm_query: rest.sysparm_query
          sysparm_count: rest.sysparm_count
          sysparm_sum_fields: rest.sysparm_sum_fields
          sysparm_group_by: rest.sysparm_group_by
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/normal-changes
      name: normal-changes
      description: Normal change request management.
      operations:
      - method: GET
        name: list-normal-changes
        description: List normal change requests.
        call: servicenow-change-management.list-normal-changes
        with:
          sysparm_query: rest.sysparm_query
          sysparm_limit: rest.sysparm_limit
        outputParameters:
        - type: object
          mapping: $.result
      - method: POST
        name: create-normal-change
        description: Create a normal change request.
        call: servicenow-change-management.create-normal-change
        with:
          short_description: rest.short_description
          description: rest.description
          priority: rest.priority
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/normal-changes/{sys_id}
      name: normal-change-detail
      description: Single normal change operations.
      operations:
      - method: GET
        name: get-normal-change
        description: Get a normal change request.
        call: servicenow-change-management.get-normal-change
        with:
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.result
      - method: PATCH
        name: update-normal-change
        description: Update a normal change request.
        call: servicenow-change-management.update-normal-change
        with:
          sys_id: rest.sys_id
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/emergency-changes
      name: emergency-changes
      description: Emergency change operations.
      operations:
      - method: GET
        name: list-emergency-changes
        description: List emergency changes.
        call: servicenow-change-management.list-emergency-changes
        with:
          sysparm_query: rest.sysparm_query
        outputParameters:
        - type: object
          mapping: $.result
      - method: POST
        name: create-emergency-change
        description: Create an emergency change.
        call: servicenow-change-management.create-emergency-change
        with:
          short_description: rest.short_description
          description: rest.description
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/standard-changes
      name: standard-changes
      description: Standard change operations.
      operations:
      - method: GET
        name: list-standard-changes
        description: List standard changes.
        call: servicenow-change-management.list-standard-changes
        with:
          sysparm_query: rest.sysparm_query
        outputParameters:
        - type: object
          mapping: $.result
    - path: /v1/trouble-tickets
      name: trouble-tickets
      description: Trouble ticket operations.
      operations:
      - method: GET
        name: list-trouble-tickets
        description: List trouble tickets.
        call: servicenow-trouble-ticket.list-trouble-tickets
        with:
          limit: rest.limit
          severity: rest.severity
          status: rest.status
          ticketType: rest.ticketType
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-trouble-ticket
        description: Create a trouble ticket.
        call: servicenow-trouble-ticket.create-trouble-ticket
        with:
          name: rest.name
          description: rest.description
          severity: rest.severity
          status: rest.status
          ticketType: rest.ticketType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/trouble-tickets/{id}
      name: trouble-ticket-detail
      description: Single trouble ticket operations.
      operations:
      - method: GET
        name: get-trouble-ticket
        description: Get a trouble ticket.
        call: servicenow-trouble-ticket.get-trouble-ticket
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: update-trouble-ticket
        description: Update a trouble ticket.
        call: servicenow-trouble-ticket.update-trouble-ticket
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: servicenow-itsm-operations-mcp
    transport: http
    description: MCP server for AI-assisted ServiceNow ITSM operations.
    tools:
    - name: list-records
      description: List records from any ServiceNow table with query filtering.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-table.list-records
      with:
        tableName: tools.tableName
        sysparm_query: tools.sysparm_query
        sysparm_fields: tools.sysparm_fields
        sysparm_limit: tools.sysparm_limit
      outputParameters:
      - type: object
        mapping: $.result
    - name: create-record
      description: Create a new record in any ServiceNow table.
      hints:
        readOnly: false
        idempotent: false
      call: servicenow-table.create-record
      with:
        tableName: tools.tableName
        record_data: tools.record_data
      outputParameters:
      - type: object
        mapping: $.result
    - name: get-record
      description: Retrieve a single record by table name and sys_id.
      hints:
        readOnly: true
        idempotent: true
      call: servicenow-table.get-record
      with:
        tableName: tools.tableName
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.result
    - name: update-record
      description: Update an existing record in a ServiceNow table.
      hints:
        readOnly: false
        idempotent: true
      call: servicenow-table.update-record
      with:
        tableName: tools.tableName
        sys_id: tools.sys_id
        record_data: tools.record_data
      outputParameters:
      - type: object
        mapping: $.result
    - name: delete-record
      description: Permanently delete a record from a ServiceNow table.
      hints:
        destructive: true
        idempotent: true
      call: servicenow-table.delete-record
      with:
        tableName: tools.tableName
        sys_id: tools.sys_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-aggregate-stats
      description: Compute aggregate statistics on any ServiceNow table.
      hints:
        readOnly: true
        idempotent: true
        openWorld: true
      call: servicenow-aggregate.get-aggregate-stats
      with:
        tableName: tools.tableName
        sysparm_query: tools.sysparm_query
        sysparm_count: tools.sysparm_count
        sysparm_sum_fields: tools.sysparm_sum_fields
        sysparm_group_by: tools.sysparm_group_by
      outputParameters:
      - type: object
        mapping: $.result
    - name: list-normal-changes

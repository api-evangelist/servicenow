components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        Basic authentication with ServiceNow credentials. The user must have
        the change_manager, change_admin, or itil role.
    oauth2:
      type: oauth2
      description: OAuth 2.0 authentication using ServiceNow's OAuth provider.
      flows:
        password:
          tokenUrl: https://{instance}.service-now.com/oauth_token.do
          scopes: {}
  parameters:
    sysId:
      name: sys_id
      in: path
      required: true
      description: The unique system identifier for the change request.
      schema:
        type: string
    sysparmQuery:
      name: sysparm_query
      in: query
      required: false
      description: >-
        An encoded query string to filter results.
      schema:
        type: string
    sysparmFields:
      name: sysparm_fields
      in: query
      required: false
      description: >-
        A comma-separated list of field names to include in the response.
      schema:
        type: string
    sysparmLimit:
      name: sysparm_limit
      in: query
      required: false
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
    sysparmOffset:
      name: sysparm_offset
      in: query
      required: false
      description: Starting record index for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0
    sysparmDisplayValue:
      name: sysparm_display_value
      in: query
      required: false
      description: >-
        Controls the format of field values in the response.
      schema:
        type: string
        enum:
        - 'true'
        - 'false'
        - all
        default: 'false'
  schemas:
    ChangeRequest:
      type: object
      description: A ServiceNow change request record.
      properties:
        sys_id:
          type: string
          description: Unique identifier for the change request.
          example: '500123'
        number:
          type: string
          description: The human-readable change request number.
          example: example_value
        short_description:
          type: string
          description: A brief summary of the change.
          example: example_value
        description:
          type: string
          description: A detailed description of the change and its purpose.
          example: A sample description.
        type:
          type: string
          description: >-
            The change type: normal, standard, or emergency.
          enum:
          - normal
          - standard
          - emergency
          example: normal
        state:
          type: string
          description: >-
            The current state of the change request in its lifecycle.
          example: example_value
        priority:
          type: string
          description: >-
            The priority level of the change request.
          enum:
          - '1'
          - '2'
          - '3'
          - '4'
          example: '1'
        risk:
          type: string
          description: The risk level assessed for this change.
          example: example_value
        impact:
          type: string
          description: The impact level of this change.
          example: example_value
        category:
          type: string
          description: The category of the change.
          example: example_value
        assigned_to:
          type: string
          description: The sys_id of the user assigned to implement the change.
          example: example_value
        assignment_group:
          type: string
          description: The sys_id of the group responsible for the change.
          example: example_value
        requested_by:
          type: string
          description: The sys_id of the user who requested the change.
          example: example_value
        start_date:
          type: string
          format: date-time
          description: The planned start date and time for the change.
          example: '2026-01-15T10:30:00Z'
        end_date:
          type: string
          format: date-time
          description: The planned end date and time for the change.
          example: '2026-01-15T10:30:00Z'
        cmdb_ci:
          type: string
          description: >-
            The sys_id of the configuration item affected by this change.
          example: example_value
        close_code:
          type: string
          description: The close code indicating how the change was resolved.
          example: example_value
        close_notes:
          type: string
          description: Notes recorded when closing the change request.
          example: example_value
        approval:
          type: string
          description: The current approval status.
          example: example_value
        sys_created_on:
          type: string
          format: date-time
          description: The date and time the change request was created.
          example: '2026-01-15T10:30:00Z'
        sys_updated_on:
          type: string
          format: date-time
          description: The date and time the change request was last updated.
          example: '2026-01-15T10:30:00Z'
    ChangeRequestInput:
      type: object

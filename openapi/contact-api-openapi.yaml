    post:
      tags:
      - Contact
      summary: Servicenow Create a Contact
      description: |
        Creates a new Customer Service Management (CSM) contact.

        You can also create a social media profile for the contact by specifying:
        - social_channel
        - social_handle
        - social_handle_url

        **Warning**: This endpoint does not perform parameter validation. Misspelled or invalid parameters are ignored without warning.
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
            examples:
              CreatecontactRequestExample:
                summary: Default createContact request
                x-microcks-default: true
                value:
                  name: Example Title
                  first_name: example_value
                  middle_name: example_value
                  last_name: example_value
